services:
  postgres:
    image: postgres:16-alpine
    container_name: telemedicine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemedicine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemedicine"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/telemedicine?schema=public
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
